<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Club نسخة مصغرة</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
  }
  
  /* شاشة البداية */
  #startScreen {
    padding: 40px 20px;
  }
  #startScreen h1 {
    font-size: 48px;
    color: #fbbf24;
    text-shadow: 0 4px 10px #000;
    margin-bottom: 30px;
  }
  .mode-btn {
    display: block;
    width: 80%;
    max-width: 300px;
    margin: 15px auto;
    padding: 15px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    border: none;
    border-radius: 15px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .mode-btn:active {
    transform: scale(0.95);
  }

  /* الرقعة */
  #gameScreen { display: none; padding: 10px; }
  .board {
    width: 90vw;
    max-width: 400px;
    height: 90vw;
    max-height: 400px;
    margin: 20px auto;
    background: #e2e8f0;
    border: 8px solid #334155;
    border-radius: 20px;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    gap: 1px;
  }
  .cell {
    background: white;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .green { background: #22c55e; }
  .red { background: #ef4444; }
  .blue { background: #3b82f6; }
  .yellow { background: #fbbf24; }
  .center { background: linear-gradient(45deg, red, yellow, green, blue); }

  .piece {
    width: 70%;
    height: 70%;
    border-radius: 50%;
    border: 2px solid #000;
    cursor: pointer;
  }
  .piece.red { background: #dc2626; }
  .piece.blue { background: #2563eb; }
  .piece.green { background: #16a34a; }
  .piece.yellow { background: #eab308; }

  /* الزهر والتحكم */
  #controls {
    margin-top: 20px;
  }
  #dice {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 15px;
    margin: 10px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: black;
    font-weight: bold;
    box-shadow: 0 5px 15px #000;
    cursor: pointer;
  }
  #rollBtn {
    padding: 12px 40px;
    background: #f59e0b;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
  }

  /* شاشة الفائز WINNER */
  #winnerScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #winnerBox {
    background: linear-gradient(180deg, #fbbf24, #f59e0b);
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    color: #1e293b;
    width: 80%;
    max-width: 350px;
  }
  #winnerBox h2 {
    font-size: 36px;
    margin: 0;
  }
  #winnerBox button {
    margin-top: 20px;
    padding: 12px 30px;
    background: #22c55e;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  /* العملات فوق */
  #topBar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: #0f172a;
  }
  .coins {
    background: #334155;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="topBar">
  <div class="coins">💰 <span id="coins">266</span></div>
  <div class="coins">⭐ 72</div>
</div>

<!-- شاشة البداية -->
<div id="startScreen">
  <h1>LUDO</h1>
  <button class="mode-btn" onclick="startGame(2)">2 اللاعبون</button>
  <button class="mode-btn" onclick="startGame(4)">4 اللاعبون</button>
  <button class="mode-btn" style="background: linear-gradient(90deg, #3b82f6, #2563eb)">العب ضد الكمبيوتر</button>
</div>

<!-- شاشة اللعبة -->
<div id="gameScreen">
  <h3 id="turnText">دورك - الأحمر</h3>
  <div class="board" id="board"></div>
  
  <div id="controls">
    <div id="dice">🎲</div>
    <button id="rollBtn" onclick="rollDice()">ارمي الزهر</button>
  </div>
</div>

<!-- شاشة WINNER -->
<div id="winnerScreen">
  <div id="winnerBox">
    <h2>WINNER</h2>
    <p>🏆 انت الفائز! 🏆</p>
    <p>كسبت 500 عملة + 3 قلوب</p>
    <button onclick="location.reload()">إعادة المباراة</button>
    <button onclick="location.reload()" style="background:#3b82f6">التالي</button>
  </div>
</div>

<script>
let diceValue = 0;
let currentPlayer = 'red';
let coins = 266;

function startGame(players) {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  createBoard();
}

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // رقعة مبسطة 15x15 - الألوان الأساسية
  for(let i=0; i<225; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    // تلوين المناطق
    if(i<36 && i%15<6) cell.classList.add('red');
    if(i<90 && i>=144 && i%15>8) cell.classList.add('green');
    if(i>189 && i%15<6) cell.classList.add('blue');
    if(i>189 && i%15>8) cell.classList.add('yellow');
    if(i==112) cell.classList.add('center');
    
    // حط القطع الحمرا في البداية
    if([0,1,15,16].includes(i)) {
      const p = document.createElement('div');
      p.className = 'piece red';
      cell.appendChild(p);
    }
    board.appendChild(cell);
  }
}

function rollDice() {
  diceValue = Math.floor(Math.random() * 6) + 1;
  document.getElementById('dice').innerText = diceValue;
  
  // لو جاب 6 يكسب لفة زيادة
  if(diceValue == 6) {
    alert('6! العب مرة تانية');
  }
  
  // تجربة: بعد 10 لفات نطلع شاشة الفوز
  if(Math.random() > 0.9) {
    showWinner();
  }
}

function showWinner() {
  document.getElementById('winnerScreen').style.display = 'flex';
  coins += 500;
  document.getElementById('coins').innerText = coins;
  
  // هنا نعرض اعلان exe.io عشان ياخد العملات
  // window.open('رابط_الاعلان_بتاعك', '_blank');
}
</script>
</body>
  </html>
