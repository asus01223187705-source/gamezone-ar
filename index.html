<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو</title>
<style>
body{background:#0d0d1a;color:#fff;font-family:Tahoma;text-align:center;padding:20px;margin:0;min-height:100vh}
h1{color:#ff3366;font-size:28px;margin:15px 0;text-shadow:0 0 15px #ff3366}
.coins-box{background:#1a1a2e;border:3px solid #ffd700;border-radius:20px;padding:20px;margin:25px auto;max-width:320px;font-size:26px;color:#ffd700;font-weight:bold;box-shadow:0 0 25px rgba(255,215,0,0.4)}
#dice{font-size:100px;margin:35px 0;filter:drop-shadow(0 0 20px #fff)}
#pos{font-size:22px;color:#ffd700;margin:20px;font-weight:bold}
.btn{width:280px;background:linear-gradient(145deg,#ff3366,#e91e63);color:#fff;border:0;padding:18px;border-radius:15px;margin:12px;cursor:pointer;font-size:20px;font-weight:bold;box-shadow:0 8px 25px rgba(255,51,102,0.6);transition:0.2s}
.btn:active{transform:scale(0.95)}
#board{display:grid;grid-template-columns:repeat(15,20px);gap:2px;justify-content:center;margin:30px auto;max-width:330px}
.cell{width:20px;height:20px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:4px}
.red{background:#ff3366;border-color:#ff3366}
.player{width:16px;height:16px;margin:2px;background:#ffd700;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px #ffd700}
#msg{font-size:17px;color:#00ff88;margin:20px;font-weight:bold}
</style>
</head>
<body>
<h1>ليدو 🎲</h1>

<div class="coins-box">💰 رصيدك: <span id="c">100</span> عملة</div>

<div id="dice">🎲</div>
<div id="pos">موقعك: 0 / 52</div>

<button class="btn" onclick="roll()">ارمي النرد -2 عملة</button>
<button class="btn" onclick="reset()">تصفير 🔄</button>

<div id="board"></div>
<div id="msg">دوس ارمي النرد عشان تبدأ</div>

<script>
var coins=100,pos=0;
function update(){document.getElementById("c").innerHTML=coins;document.getElementById("pos").innerHTML="موقعك: "+pos+" / 52";draw()}
function roll(){
if(coins<2){document.getElementById("msg").innerHTML="❌ رصيدك أقل من 2";document.getElementById("msg").style.color="#ff3366";return}
coins-=2;var d=Math.floor(Math.random()*6)+1;document.getElementById("dice").innerHTML=d;
if(d==6&&pos==0){pos=1;document.getElementById("msg").innerHTML="✅ بدأت! مشيت 1"}
else if(pos>0){pos+=d;document.getElementById("msg").innerHTML="مشيت "+d+" خطوات"}
else if(d==6){pos=1;document.getElementById("msg").innerHTML="✅ 6! بدأت"}
else{document.getElementById("msg").innerHTML="لازم 6 عشان تبدأ ❌"}
if(pos>=52){coins+=50;pos=0;document.getElementById("msg").innerHTML="🔥 كسبت! +50 عملة 🔥";document.getElementById("dice").innerHTML="🏆"}
document.getElementById("msg").style.color="#00ff88";update()}
function reset(){coins=100;pos=0;document.getElementById("dice").innerHTML="🎲";document.getElementById("msg").innerHTML="تم التصفير ✅";update()}
function draw(){var b=document.getElementById("board");b.innerHTML="";for(var i=0;i<60;i++){var c=document.createElement("div");c.className="cell";if(i%15==0)c.classList.add("red");if(pos==i)c.innerHTML='<div class="player"></div>';b.appendChild(c)}}
update();
</script>
</body>
</html>
