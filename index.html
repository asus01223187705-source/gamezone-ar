<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div class="badge">⭐ 72</div>
  <div class="badge">💰 <span id="coins">266</span></div>
</div>

<div id="start" class="screen active">
  <h1>LUDO</h1>
  <button onclick="startGame(2)">2 اللاعبون</button>
  <button onclick="startGame(4)">4 اللاعبون</button>
  <button class="blue" onclick="startGame('bot')">العب ضد الكمبيوتر</button>
  <button class="ads" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>

<div id="game" class="screen">
  <p id="turn">دورك - الأحمر</p>
  <canvas id="board" width="450" height="450"></canvas>
  <div id="dice">2</div>
  <button id="roll" onclick="rollDice()">ارمي الزهر</button>
</div>

<div id="winner" class="screen">
  <div class="win-box">
    <h2>WINNER</h2>
    <p>🏆 انت الفائز! 🏆</p>
    <p>+500 عملة</p>
    <button onclick="location.reload()">إعادة المباراة</button>
  </div>
</div>

<script src="game.js"></script>
</body>
  </html>
