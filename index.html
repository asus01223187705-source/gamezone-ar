<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone</title>
<style>
body{background:#0f0f1e;color:#fff;font-family:Tahoma;text-align:center;padding:10px;margin:0;}
h1{color:#e94560;margin:10px 0;}
#coins{font-size:24px;color:#ffd700;margin:15px;padding:12px;background:#16213e;border-radius:10px;border:2px solid #ffd700;}
.wallet button{font-size:13px;padding:10px;margin:5px;border-radius:8px;background:#e94560;color:#fff;border:none;cursor:pointer;}
.wallet button.ad{background:#ff9800;}
.games{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:20px auto;}
.game{background:#0f3460;padding:15px;border-radius:12px;border:2px solid #e94560;cursor:pointer;font-weight:bold;}
button{background:#e94560;color:#fff;border:none;padding:10px 15px;border-radius:8px;margin:5px;cursor:pointer;font-size:15px;}
input{padding:8px;border-radius:6px;border:none;text-align:center;margin:5px;width:160px;}
#result{margin-top:15px;font-size:17px;color:#ffd700;min-height:30px;}
#ludoBoard{display:grid;grid-template-columns:repeat(15,18px);gap:2px;justify-content:center;margin:10px auto;}
.cell{width:18px;height:18px;background:#16213e;border:1px solid #0f3460;}
.red{background:#e94560;}
.player{width:14px;height:14px;margin:2px;background:#fff;border:2px solid #e94560;border-radius:50%;}
</style>
</head>
<body>
<h1>🎮 GameZone</h1>
<div id="coins">💰 رصيدك: 100 عملة</div>

<div class="wallet">
<button onclick="deposit()">➕ إيداع +500</button>
<button class="ad" onclick="watchAd()">📺 إعلان +50</button>
<button onclick="resetGame()">🔄 تصفير</button>
</div>

<div class="games">
<div class="game" onclick="game1()">🧠 الذاكرة<br><small>+15</small></div>
<div class="game" onclick="game2()">🐦 سؤال<br><small>+20</small></div>
<div class="game" onclick="game3()">✊ حجر ورقة<br><small>+10</small></div>
<div class="game" onclick="game4()">🎰 سلوتس<br><small>جاكبوت 200</small></div>
<div class="game" onclick="game5()" style="grid-column:1/3;">🎲 ليدو<br><small>ارمي بـ2 - كسب 50</small></div>
</div>

<div id="gameArea"></div>
<p id="result"></p>

<script>
let coins = localStorage.coins ? parseInt(localStorage.coins) : 100;
let ludoPos = localStorage.ludo ? JSON.parse(localStorage.ludo) : 0;
updateCoins();

function updateCoins(){
  document.getElementById('coins').innerText = '💰 رصيدك: ' + coins + ' عملة';
  localStorage.coins = coins;
}

function deposit(){coins += 500; updateCoins(); result('تم الإيداع +500 ✅', true)}
function watchAd(){coins += 50; updateCoins(); result('شاهدت إعلان +50 ✅', true)}
function resetGame(){if(confirm('تصفير؟')){coins=100;ludoPos=0;localStorage.clear();updateCoins();result('تم التصفير ✅', true)}}
function result(msg, ok){let r=document.getElementById('result');r.innerText=msg;r.style.color=ok?'#2ecc71':'#e94560'}

function game1(){
  let num = Math.floor(Math.random()*900+100);
  document.getElementById('gameArea').innerHTML = `<h3>🧠 احفظ الرقم</h3><p><span id="n" style="font-size:40px;color:#ffd700">${num}</span></p><input type="number" id="ans"><button onclick="check1(${num})">تأكيد</button>`;
  setTimeout(()=>{document.getElementById('n').innerText='***'}, 3000);
}
function check1(num){if(document.getElementById('ans').value==num){coins+=15;updateCoins();result('صح! +15 ✅',true)}else{result('غلط! كان '+num+' ❌',false)}}

function game2(){
  let q=['عاصمة مصر؟','2+2=?','لون السماء؟'], a=['القاهرة','4','ازرق'], r=Math.floor(Math.random()*3);
  document.getElementById('gameArea').innerHTML = `<h3>🐦 سؤال</h3><p style="font-size:20px">${q[r]}</p><input type="text" id="ans2"><button onclick="check2('${a[r]}')">إجابة</button>`;
}
function check2(ans){if(document.getElementById('ans2').value.toLowerCase()==ans.toLowerCase()){coins+=20;updateCoins();result('صح! +20 ✅',true)}else{result('غلط! '+ans+' ❌',false)}}

function game3(){
  document.getElementById('gameArea').innerHTML = `<h3>✊ حجر ورقة مقص</h3><button onclick="playRPS('حجر')">✊</button><button onclick="playRPS('ورقة')">✋</button><button onclick="playRPS('مقص')">✌️</button>`;
}
function playRPS(user){let comp=['حجر','ورقة','مقص'][Math.floor(Math.random()*3)];if(user==comp){coins+=10;updateCoins();result('تعادل! '+comp+' +10 ✅',true)}else if((user=='حجر'&&comp=='مقص')||(user=='ورقة'&&comp=='حجر')||(user=='مقص'&&comp=='ورقة')){coins+=10;updateCoins();result('كسبت! '+comp+' +10 ✅',true)}else{result('خسرت! '+comp+' ❌',false)}}

function game4(){
  if(coins<5){result('محتاج 5 عملة ❌',false);return}
  coins-=5; let e=['🍎','🍊','🍇','⭐','🔔'], s1=e[Math.floor(Math.random()*5)], s2=e[Math.floor(Math.random()*5)], s3=e[Math.floor(Math.random()*5)];
  document.getElementById('gameArea').innerHTML = `<h3>🎰 سلوتس -5</h3><p style="font-size:50px">${s1} ${s2} ${s3}</p><button onclick="game4()">لف تاني</button>`;
  if(s1==s2&&s2==s3){coins+=200;result('جاكبوت 200 🔥🔥',true)}else if(s1==s2||s2==s3||s1==s3){coins+=15;result('اتنين زي بعض +15 ✅',true)}else{result('خسرت -5 ❌',false)}updateCoins()
}

function game5(){
  document.getElementById('gameArea').innerHTML = `<h3>
