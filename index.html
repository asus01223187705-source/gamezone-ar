<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<style>
  body {
    margin: 0;
    background: #0a1428;
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #061020;
  }
  .badge {
    background: #1e293b;
    padding: 8px 16px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 16px;
  }
  h1 {
    font-size: 60px;
    color: #fbbf24;
    text-shadow: 0 5px 20px #000;
    margin: 60px 0 40px;
  }
  .btn {
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 16px;
    background: #22c55e;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    display: block;
    box-shadow: 0 4px 0 #16a34a;
  }
  .btn.blue { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
  .btn.ads { background: #f59e0b; box-shadow: 0 4px 0 #d97706; font-size: 18px; }
  
  #game { display: none; padding: 15px; }
  #turn { font-size: 22px; margin: 15px 0; font-weight: bold; }
  
  #board {
    border: 8px solid #0f172a;
    border-radius: 20px;
    background: #e2e8f0;
    width: 95vw;
    max-width: 450px;
    height: 95vw;
    max-height: 450px;
    margin: 0 auto;
  }
  
  #dice {
    width: 90px;
    height: 90px;
    background: white;
    border-radius: 18px;
    margin: 20px auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    color: #0f172a;
    font-weight: bold;
    box-shadow: 0 6px 0 #cbd5e1;
  }
  
  #roll {
    padding: 14px 45px;
    background: #f59e0b;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 #d97706;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="badge">⭐ 72</div>
  <div class="badge">💰 <span id="coins">266</span></div>
</div>

<div id="start">
  <h1>LUDO</h1>
  <button class="btn" onclick="startGame()">2 اللاعبون</button>
  <button class="btn" onclick="startGame()">4 اللاعبون</button>
  <button class="btn blue" onclick="startGame()">العب ضد الكمبيوتر</button>
  <button class="btn ads" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>

<div id="game">
  <p id="turn">دورك - الأحمر</p>
  <canvas id="board"></canvas>
  <div id="dice">2</div>
  <button id="roll" onclick="rollDice()">ارمي الزهر</button>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let coins = 266;

// ظبط مقاس الكانفاس
function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.95, 450);
  canvas.width = size;
  canvas.height = size;
}
resizeCanvas();
window.onresize = resizeCanvas;

function startGame() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  drawBoard();
}

function drawBoard() {
  const size = canvas.width;
  const cell = size / 15;
  
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#e2e8f0';
  ctx.fillRect(0, 0, size, size);
  
  // 4 بيوت ملونة
  drawHome(0, 0, cell*6, '#ef4444'); // احمر
  drawHome(9*cell, 0, cell*6, '#3b82f6'); // ازرق
  drawHome(0, 9*cell, cell*6, '#eab308'); // اصفر
  drawHome(9*cell, 9*cell, cell*6, '#22c55e'); // اخضر
  
  // المسار الابيض
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1;
  
  for(let i=0; i<15; i++) {
    // العمود النص
    if(i < 6 || i > 8) {
      ctx.fillRect(6*cell, i*cell, cell, cell);
      ctx.strokeRect(6*cell, i*cell, cell, cell);
    }
    // الصف النص
    if(i < 6 || i > 8) {
      ctx.fillRect(i*cell, 6*cell, cell, cell);
      ctx.strokeRect(i*cell, 6*cell, cell, cell);
    }
  }
  
  // المثلث النص
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.moveTo(7*cell, 7*cell);
  ctx.lineTo(7*cell, 6*cell);
  ctx.lineTo(6*cell, 7*cell);
  ctx.fill();
  
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.moveTo(7*cell, 7*cell);
  ctx.lineTo(7*cell, 6*cell);
  ctx.lineTo(8*cell, 7*cell);
  ctx.fill();
  
  // دواير البداية + قطع حمرا
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#000';
  for(let i=0; i<2; i++) {
    for(let j=0; j<2; j++) {
      let x = cell*1.5 + i*cell*2;
      let y = cell*1.5 + j*cell*2;
      ctx.beginPath();
      ctx.arc(x, y, cell*0.7, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      
      // قطعة حمرا
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      ctx.arc(x, y, cell*0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'white';
    }
  }
}

function drawHome(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, size, size);
}

function rollDice() {
  const num = Math.floor(Math.random() * 6) + 1;
  document.getElementById('dice').innerText = num;
  alert('طلع رقم: ' + num + ' - الحركة لسه هضيفها بعدين');
}

function watchAd() {
  window.open('https://exe.io/حط_رابطك_هنا', '_blank');
  setTimeout(() => {
    coins += 100;
    document.getElementById('coins').innerText = coins;
    alert('مبروك +100 عملة!');
  }, 3000);
}
</script>
</body>
</html>
