<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<style>
  body {
    margin: 0;
    background: #0a1428;
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #061020;
  }
  .badge {
    background: #1e293b;
    padding: 8px 16px;
    border-radius: 25px;
    font-weight: bold;
  }
  h1 {
    font-size: 60px;
    color: #fbbf24;
    text-shadow: 0 5px 20px #000;
    margin: 50px 0 30px;
  }
  .btn {
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 16px;
    background: #22c55e;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    display: block;
    box-shadow: 0 4px 0 #16a34a;
  }
  .btn.blue { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
  .btn.ads { background: #f59e0b; box-shadow: 0 4px 0 #d97706; font-size: 18px; }
  
  #game { display: none; padding: 10px; }
  #turn { font-size: 22px; margin: 10px 0 15px; }
  
  #board {
    border-radius: 20px;
    width: 95vw;
    max-width: 420px;
    height: 95vw;
    max-height: 420px;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  
  #dice {
    width: 85px;
    height: 85px;
    background: white;
    border-radius: 18px;
    margin: 15px auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: #0f172a;
    font-weight: bold;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  }
  
  #roll {
    padding: 14px 45px;
    background: #f59e0b;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="badge">💰 <span id="coins">266</span></div>
  <div class="badge">⭐ 72</div>
</div>

<div id="start">
  <h1>LUDO</h1>
  <button class="btn" onclick="startGame()">2 اللاعبون</button>
  <button class="btn" onclick="startGame()">4 اللاعبون</button>
  <button class="btn blue" onclick="startGame()">العب ضد الكمبيوتر</button>
  <button class="btn ads" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>

<div id="game">
  <p id="turn">دورك - الأحمر</p>
  <canvas id="board"></canvas>
  <div id="dice">4</div>
  <button id="roll" onclick="rollDice()">ارمي الزهر</button>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let coins = 266;

resizeCanvas();
window.onresize = resizeCanvas;

function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.95, 420);
  canvas.width = size;
  canvas.height = size;
}

function startGame() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  drawBoard();
}

function drawBoard() {
  const size = canvas.width;
  const cell = size / 15;
  
  // خلفية رمادي فاتح زي الصورة
  ctx.fillStyle = '#d1d5db';
  ctx.fillRect(0, 0, size, size);
  
  // رسم البيوت 4 الوان بزوايا مدورة
  drawRoundedRect(0, 0, cell*6, cell*6, 15, '#ef4444'); // احمر
  drawRoundedRect(9*cell, 0, cell*6, cell*6, 15, '#3b82f6'); // ازرق
  drawRoundedRect(0, 9*cell, cell*6, cell*6, 15, '#eab308'); // اصفر
  drawRoundedRect(9*cell, 9*cell, cell*6, cell*6, 15, '#22c55e'); // اخضر
  
  // المسار الابيض + المربعات
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#9ca3af';
  ctx.lineWidth = 2;
  
  for(let i=0; i<15; i++) {
    // العمود النص
    if(i < 6 || i > 8) {
      ctx.fillRect(6*cell, i*cell, cell, cell);
      ctx.strokeRect(6*cell, i*cell, cell, cell);
    }
    // الصف النص
    if(i < 6 || i > 8) {
      ctx.fillRect(i*cell, 6*cell, cell, cell);
      ctx.strokeRect(i*cell, 6*cell, cell, cell);
    }
  }
  
  // المثلثات الملونة في النص
  drawTriangle(6*cell, 6*cell, 7*cell, 7*cell, 6*cell, 7*cell, '#ef4444');
  drawTriangle(6*cell, 6*cell, 7*cell, 7*cell, 7*cell, 6*cell, '#3b82f6');
  drawTriangle(8*cell, 6*cell, 7*cell, 7*cell, 8*cell, 7*cell, '#22c55e');
  drawTriangle(6*cell, 8*cell, 7*cell, 7*cell, 7*cell, 8*cell, '#eab308');
  
  // قطعة حمرا في البيت
  ctx.fillStyle = '#dc2626';
  ctx.beginPath();
  ctx.arc(cell*1.5, cell*1.5, cell*0.6, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#7f1d1d';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawRoundedRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.fill();
}

function drawTriangle(x1,y1,x2,y2,x3,y3,color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.lineTo(x3,y3);
  ctx.fill();
  ctx.strokeStyle = '#6b7280';
  ctx.stroke();
}

function rollDice() {
  const num = Math.floor(Math.random() * 6) + 1
