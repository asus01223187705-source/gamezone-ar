<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
  }
  .top {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
  }
  .badge {
    background: #1e293b;
    padding: 8px 20px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 17px;
  }
  
  #start h1 {
    font-size: 70px;
    color: #fbbf24;
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin: 60px 0 40px;
    font-weight: 900;
  }
  
  .btn {
    width: 88%;
    max-width: 330px;
    margin: 12px auto;
    padding: 18px;
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 23px;
    font-weight: bold;
    cursor: pointer;
    display: block;
  }
  .btn.green {
    background: linear-gradient(180deg, #10b981, #059669);
    box-shadow: 0 6px 0 #047857;
  }
  .btn.blue {
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    box-shadow: 0 6px 0 #1d4ed8;
  }
  .btn.orange {
    background: linear-gradient(180deg, #f97316, #ea580c);
    box-shadow: 0 6px 0 #c2410c;
    font-size: 19px;
  }
  
  #game { display: none; }
  #turn {
    font-size: 24px;
    margin: 20px 0;
    font-weight: bold;
  }
  
  canvas {
    border-radius: 18px;
    width: 94vw;
    max-width: 400px;
    height: 94vw;
    max-height: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  }
  
  #dice {
    width: 90px;
    height: 90px;
    background: white;
    border-radius: 20px;
    margin: 20px auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    color: #0f172a;
    font-weight: 900;
    box-shadow: 0 8px 0 #cbd5e1;
  }
  
  #roll {
    padding: 16px 50px;
    background: linear-gradient(180deg, #f97316, #ea580c);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 21px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 0 #c2410c;
  }
</style>
</head>
<body>

<div class="top">
  <div class="badge">💰 <span id="coins">266</span></div>
  <div class="badge">⭐ 72</div>
</div>

<div id="start">
  <h1>LUDO</h1>
  <button class="btn green" onclick="startGame()">2 اللاعبون</button>
  <button class="btn green" onclick="startGame()">4 اللاعبون</button>
  <button class="btn blue" onclick="startGame()">العب ضد الكمبيوتر</button>
  <button class="btn orange" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>

<div id="game">
  <div id="turn">دورك - الأحمر</div>
  <canvas id="board"></canvas>
  <div id="dice">4</div>
  <button id="roll" onclick="rollDice()">ارمي الزهر</button>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let coins = 266;

// ظبط المقاس
function resize() {
  const size = Math.min(window.innerWidth * 0.94, 400);
  canvas.width = size;
  canvas.height = size;
}
resize();
window.onresize = resize;

function startGame() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  drawBoard();
}

function drawBoard() {
  const size = canvas.width;
  const cell = size / 15;
  
  // خلفية رمادي فاتح
  ctx.fillStyle = '#e2e8f0';
  ctx.fillRect(0, 0, size, size);
  
  // البيوت 4 الوان بزوايا مدورة
  drawRounded(0, 0, cell*6, cell*6, 12, '#ef4444');
  drawRounded(9*cell, 0, cell*6, cell*6, 12, '#3b82f6');
  drawRounded(0, 9*cell, cell*6, cell*6, 12, '#f59e0b');
  drawRounded(9*cell, 9*cell, cell*6, cell*6, 12, '#22c55e');
  
  // المسار الرمادي 3 مربعات في النص
  ctx.fillStyle = '#cbd5e1';
  ctx.fillRect(6*cell, 0, cell*3, 6*cell); // فوق
  ctx.fillRect(6*cell, 9*cell, cell*3, 6*cell); // تحت
  ctx.fillRect(0, 6*cell, 6*cell, cell*3); // شمال
  ctx.fillRect(9*cell, 6*cell, 6*cell, cell*3); // يمين
  
  // المربعات البيضا + الخطوط
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1;
  for(let i=0; i<15; i++) {
    for(let j=0; j<15; j++) {
      // ارسم المربع الابيض لو مش بيت ملون
      if(!((i<6&&j<6) || (i<6&&j>8) || (i>8&&j<6) || (i>8&&j>8))) {
        ctx.strokeRect(j*cell, i*cell, cell, cell);
      }
    }
  }
  
  // المثلث النص 4 الوان
  drawTri(6*cell, 6*cell, 7.5*cell, 7.5*cell, 6*cell, 7.5*cell, '#ef4444');
  drawTri(6*cell, 6*cell, 7.5*cell, 7.5*cell, 7.5*cell, 6*cell, '#3b82f6');
  drawTri(9*cell, 6*cell, 7.5*cell, 7.5*cell, 9*cell, 7.5*cell, '#22c55e');
  drawTri(6*cell, 9*cell, 7.5*cell, 7.5*cell, 7.5*cell, 9*cell, '#f59e0b');
  
  // القطعة الحمرا في البيت
  ctx.fillStyle = '#dc2626';
  ctx.strokeStyle = '#7f1d1d';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cell*1.5, cell*1.5, cell*0.6, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

function drawRounded(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.fill();
}

function drawTri(x1,y1,x2,y2,x3,y3,color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.lineTo(x3,y3);
  ctx.fill();
  ctx.strokeStyle = '#6b7280';
  ctx.stroke();
}

function rollDice() {
  document.getElementById('dice').innerText = Math.floor(Math.random() * 6) + 1;
}

function watchAd() {
  window.open('https://exe.io/حط_رابطك', '_blank');
  setTimeout(() => {
    coins += 100;
    document.getElementById('coins').innerText = coins;
  }, 3000);
}
</script>
</body>
  </html>
