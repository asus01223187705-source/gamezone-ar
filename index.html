<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>سباق متوسكل</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;background:#87CEEB;overflow:hidden;font-family:tahoma}
canvas{display:block;background:linear-gradient(#87CEEB 0%,#87CEEB 60%,#228B22 60%)}
#controls{position:fixed;bottom:20px;width:100%;display:flex;justify-content:space-between;padding:0 30px}
.btn{width:80px;height:80px;border-radius:50%;background:#ff5722;color:white;border:none;font-size:30px;opacity:0.7}
#speed{position:fixed;top:10px;right:10px;color:white;font-size:20px;background:rgba(0,0,0,0.5);padding:5px 15px;border-radius:10px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="speed">السرعة: 0</div>
<div id="controls">
  <button class="btn" ontouchstart="brake=true" ontouchend="brake=false">⏪</button>
  <button class="btn" ontouchstart="gas=true" ontouchend="gas=false">⏩</button>
</div>

<script>
let canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {x:100, y:200, speed:0, angle:0};
let gas = false, brake = false;
let enemies = [{x:150,s:2},{x:200,s:2.5},{x:250,s:1.8}];

function drawHill(x){
  ctx.beginPath();
  ctx.moveTo(x, canvas.height*0.6);
  ctx.quadraticCurveTo(x+100, canvas.height*0.6-50, x+200, canvas.height*0.6);
  ctx.lineTo(x+200, canvas.height);
  ctx.lineTo(x, canvas.height);
  ctx.fillStyle = '#2e7d32';
  ctx.fill();
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // نرسم التلال
  for(let i=-1;i<5;i++) drawHill(i*200 - player.x%200);
  
  // تحكم اللاعب
  if(gas) player.speed += 0.3;
  if(brake) player.speed -= 0.5;
  player.speed *= 0.98; // احتكاك
  if(player.speed<0) player.speed=0;
  if(player.speed>12) player.speed=12;
  
  player.x += player.speed;
  
  // نرسم اللاعب
  ctx.fillStyle = 'red';
  ctx.fillRect(canvas.width/2-15, canvas.height*0.6-30, 30, 20);
  ctx.beginPath();
  ctx.arc(canvas.width/2-10, canvas.height*0.6, 8, 0, Math.PI*2);
  ctx.arc(canvas.width/2+10, canvas.height*0.6, 8, 0, Math.PI*2);
  ctx.fill();
  
  // نرسم الخصوم
  ctx.fillStyle = 'blue';
  enemies.forEach(e=>{
    e.x += e.s;
    let ex = e.x - player.x + canvas.width/2;
    if(ex>-50 && ex<canvas.width+50){
      ctx.fillRect(ex-15, canvas.height*0.6-30, 30, 20);
      ctx.beginPath();
      ctx.arc(ex-10, canvas.height*0.6, 8, 0, Math.PI*2);
      ctx.arc(ex+10, canvas.height*0.6, 8, 0, Math.PI*2);
      ctx.fill();
    }
  });
  
  document.getElementById('speed').innerText = 'السرعة: ' + Math.floor(player.speed*10);
  
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
