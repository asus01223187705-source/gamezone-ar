<!DOCTYPE html>
<html lang=ar dir=rtl>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width, initial-scale=1.0">
<title>GameZone</title>
<style>
body{background:#0a0a1a;color:#fff;font-family:Tahoma;text-align:center;padding:15px;margin:0}
h1{color:#ff3366;font-size:26px;margin:10px}
#coins{background:#1e1e3f;border:3px solid #ffd700;border-radius:15px;padding:18px;margin:20px auto;max-width:350px;font-size:28px;color:#ffd700;font-weight:bold}
.wallet{display:flex;gap:10px;justify-content:center;margin:20px;flex-wrap:wrap}
.wallet button{font-size:14px;padding:12px 18px;border-radius:12px;background:#ff3366;color:#fff;border:0;font-weight:bold;cursor:pointer}
.wallet button.ad{background:#ff9800}
.games{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:600px;margin:25px auto}
.game{background:#1e3a5f;padding:25px 15px;border-radius:20px;border:3px solid #ff3366;cursor:pointer;font-weight:bold;font-size:18px}
.game:hover{border-color:#ffd700;transform:scale(1.05)}
.game small{display:block;margin-top:8px;font-size:14px;color:#ffd700}
#gameArea{margin-top:25px;min-height:200px}
#result{margin-top:20px;font-size:19px;color:#ffd700;min-height:35px;font-weight:bold}
button{background:#ff3366;color:#fff;border:0;padding:12px 25px;border-radius:10px;margin:8px;cursor:pointer;font-size:16px;font-weight:bold}
input{padding:10px;border-radius:8px;border:2px solid #ff3366;text-align:center;margin:8px;width:180px;font-size:16px;background:#1e1e3f;color:#fff}
#ludoBoard{display:grid;grid-template-columns:repeat(15,20px);gap:3px;justify-content:center;margin:15px auto}
.cell{width:20px;height:20px;background:#1e1e3f;border:1px solid #0f3460;border-radius:4px}
.red{background:#ff3366}
.player{width:16px;height:16px;margin:2px;background:#ffd700;border-radius:50%;border:2px solid #fff}
</style>
</head>
<body>
<h1>GameZone 🎮</h1>
<div id=coins>💰 رصيدك: 100 عملة</div>

<div class=wallet>
<button class=ad onclick="coins+=50;update()">📺 إعلان +50</button>
<button onclick="coins+=500;update()">➕ إيداع +500</button>
<button onclick="if(confirm('تصفير؟')){coins=100;ludo=0;localStorage.clear();update()}">🔄 تصفير</button>
</div>

<div class=games>
<div class=game onclick="mem()">🧠 الذاكرة<br><small>+15 عملة</small></div>
<div class=game onclick="q()">🐦 سؤال<br><small>+20 عملة</small></div>
<div class=game onclick="rps()">✊ حجر ورقة<br><small>+10 عملة</small></div>
<div class=game onclick="slot()">🎰 سلوتس<br><small>جاكبوت 200!</small></div>
<div class=game onclick="ludo()" style="grid-column:1/3">🎲 ليدو<br><small>ارمي بـ2 - كسب 50</small></div>
</div>

<div id=gameArea></div>
<p id=result></p>

<script>
let coins=localStorage.c?parseInt(localStorage.c):100;
let ludo=localStorage.l?parseInt(localStorage.l):0;
function update(){document.getElementById('coins').innerHTML='💰 رصيدك: '+coins+' عملة';localStorage.c=coins}
function msg(t,ok){let r=document.getElementById('result');r.innerText=t;r.style.color=ok?'#00ff88':'#ff3366';setTimeout(()=>r.innerText='',3000)}
update()

function mem(){
let n=Math.floor(Math.random()*900+100);

setTimeout(()=>document.getElementById('n').innerText='***',3000)}
