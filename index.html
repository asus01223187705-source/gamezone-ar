<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تجربة</title>
<style>
body{background:#111;color:#fff;text-align:center;padding:50px;font-family:Tahoma}
#coins{font-size:30px;color:yellow;margin:30px}
button{font-size:20px;padding:15px 30px;margin:10px;background:red;color:white;border:0;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<h1>تجربة الأزرار</h1>
<div id="coins">الرصيد: 100</div>
<button onclick="coins=coins+50;show()">+50 إعلان</button>
<button onclick="coins=coins+500;show()">+500 إيداع</button>
<button onclick="coins=100;show()">تصفير</button>

<script>
var coins = 100;
function show(){
document.getElementById("coins").innerHTML = "الرصيد: " + coins;
alert("الرصيد دلوقتي: " + coins);
}
</script>
</body>
</html>
