<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Bike Bridge</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;background:#4fc3f7;overflow:hidden}
canvas{display:block}
#btns{position:fixed;bottom:20px;right:20px;display:grid;gap:10px}
.btn{width:70px;height:70px;border-radius:50%;border:none;font-size:24px;color:white;opacity:0.8}
#gas{background:#4caf50} #brake{background:#f44336} #jump{background:#ff9800}
#pos{position:fixed;top:10px;left:10px;color:white;background:rgba(0,0,0,0.6);padding:8px 15px;border-radius:8px;font-size:18px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="pos">المركز: 4th</div>
<div id="btns">
  <button id="jump" class="btn" ontouchstart="jump=true" ontouchend="jump=false">↑</button>
  <button id="gas" class="btn" ontouchstart="gas=true" ontouchend="gas=false">⏩</button>
  <button id="brake" class="btn" ontouchstart="brake=true" ontouchend="brake=false">⏪</button>
</div>

<script>
let c=document.getElementById('c'), ctx=c.getContext('2d');
c.width=innerWidth; c.height=innerHeight;

let player={x:100,y:300,speed:0,vy:0,onGround:true};
let gas=false, brake=false, jump=false;
let cam=0;
let rivals=[{x:300,s:3},{x:450,s:3.5},{x:600,s:2.8}];

// نرسم كوبري خشب
function drawBridge(x){
  ctx.fillStyle='#8B4513';
  ctx.fillRect(x-cam, 350, 200, 20);
  for(let i=0;i<10;i++) ctx.fillRect(x+20*i-cam, 330, 5, 40);
}

function loop(){
  ctx.clearRect(0,0,c.width,c.height);
  
  // سماء وبحر
  ctx.fillStyle='#4fc3f7'; ctx.fillRect(0,0,c.width,350);
  ctx.fillStyle='#0277bd'; ctx.fillRect(0,370,c.width,c.height);
  
  // تحكم
  if(gas) player.speed+=0.4;
  if(brake) player.speed-=0.6;
  if(jump && player.onGround){player.vy=-12; player.onGround=false;}
  
  player.speed*=0.95;
  player.vy+=0.6; // جاذبية
  player.y+=player.vy;
  
  if(player.y>330){player.y=330; player.vy=0; player.onGround=true;}
  
  player.x+=player.speed;
  cam=player.x-150;
  
  // نرسم 3 كباري ورا بعض
  for(let i=0;i<5;i++) drawBridge(i*250);
  
  // اللاعب
  ctx.fillStyle='#ffeb3b';
  ctx.fillRect(150, player.y-25, 40, 15); // جسم
  ctx.beginPath();
  ctx.arc(155, player.y+5, 8, 0, 6.28);
  ctx.arc(185, player.y+5, 8, 0, 6.28);
  ctx.fillStyle='black'; ctx.fill();
  
  // الخصوم
  ctx.fillStyle='#e91e63';
  rivals.forEach(r=>{
    r.x+=r.s;
    let rx=r.x-cam;
    if(rx>-50 && rx<c.width+50){
      ctx.fillRect(rx, 325, 40, 15);
      ctx.beginPath();
      ctx.arc(rx+5, 340, 8, 0, 6.28);
      ctx.arc(rx+35, 340, 8, 0, 6.28);
      ctx.fill();
    }
  });
  
  // المركز
  let rank=1;
  rivals.forEach(r=>{if(r.x>player.x) rank++});
  document.getElementById('pos').innerText='المركز: '+rank+'th';
  
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
