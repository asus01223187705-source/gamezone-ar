<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<style>
  body {
    margin: 0;
    background: #0a1428;
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #061020;
  }
  .badge {
    background: #1e293b;
    padding: 8px 18px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 16px;
  }
  h1 {
    font-size: 60px;
    color: #fbbf24;
    text-shadow: 0 6px 20px #000;
    margin: 50px 0 30px;
    letter-spacing: 3px;
  }
  .btn {
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 16px;
    background: #22c55e;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    display: block;
    box-shadow: 0 4px 0 #16a34a;
  }
  .btn.blue { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
  .btn.ads { background: #f59e0b; box-shadow: 0 4px 0 #d97706; font-size: 18px; }
  
  #game { display: none; padding: 10px; }
  #turn { font-size: 22px; margin: 10px 0 15px; font-weight: bold; }
  
  .board-wrap {
    width: 95vw;
    max-width: 420px;
    margin: 0 auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  
  #dice {
    width: 85px;
    height: 85px;
    background: white;
    border-radius: 18px;
    margin: 15px auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: #1e293b;
    font-weight: bold;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  }
  
  #roll {
    padding: 14px 45px;
    background: #f59e0b;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="badge">💰 <span id="coins">266</span></div>
  <div class="badge">⭐ 72</div>
</div>

<div id="start">
  <h1>LUDO</h1>
  <button class="btn" onclick="startGame()">2 اللاعبون</button>
  <button class="btn" onclick="startGame()">4 اللاعبون</button>
  <button class="btn blue" onclick="startGame()">العب ضد الكمبيوتر</button>
  <button class="btn ads" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>
