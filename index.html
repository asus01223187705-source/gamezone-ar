<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone Pro</title>
<style>
*{box-sizing:border-box}
body{background:linear-gradient(180deg,#0a0a1a,#1a1a2e);color:#fff;font-family:'Tahoma',sans-serif;text-align:center;padding:15px;margin:0;min-height:100vh;}
h1{color:#ff3366;text-shadow:0 0 20px #ff3366;font-size:26px;margin:10px 0;}

#coins{background:#1e1e3f;border:3px solid #ffd700;border-radius:15px;padding:18px;margin:20px auto;max-width:350px;font-size:28px;color:#ffd700;font-weight:bold;box-shadow:0 0 30px rgba(255,215,0,0.3);}

.wallet{display:flex;gap:10px;justify-content:center;margin:20px;flex-wrap:wrap;}
.wallet button{font-size:14px;padding:12px 18px;border-radius:12px;background:#ff3366;color:#fff;border:none;font-weight:bold;cursor:pointer;box-shadow:0 4px 15px rgba(255,51,102,0.4);transition:0.2s;}
.wallet button:hover{transform:translateY(-2px);}
.wallet button.ad{background:#ff9800;box-shadow:0 4px 15px rgba(255,152,0,0.4);}

.games{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:600px;margin:25px auto;}
.game{background:linear-gradient(145deg,#1e3a5f,#0f3460);padding:25px 15px;border-radius:20px;border:3px solid #ff3366;cursor:pointer;transition:0.3s;font-weight:bold;font-size:18px;box-shadow:0 8px 25px rgba(255,51,102,0.2);}
.game:hover{transform:scale(1.05);box-shadow:0 0 35px rgba(255,51,102,0.6);border-color:#ffd700;}
.game small{display:block;margin-top:8px;font-size:14px;color:#ffd700;}

#gameArea{margin-top:25px;min-height:200px;}
#result{margin-top:20px;font-size:19px;color:#ffd700;min-height:35px;font-weight:bold;}
button{background:#ff3366;color:#fff;border:none;padding:12px 25px;border-radius:10px;margin:8px;cursor:pointer;font-size:16px;font-weight:bold;box-shadow:0 4px 12px rgba(255,51,102,0.4);}
input{padding:10px;border-radius:8px;border:2px solid #ff3366;text-align:center;margin:8px;width:180px;font-size:16px;background:#1e1e3f;color:#fff;}
#ludoBoard{display:grid;grid-template-columns:repeat(15,20px);gap:3px;justify-content:center;margin:15px auto;max-width:350px;}
.cell{width:20px;height:20px;background:#1e1e3f;border:1px solid #0f3460;border-radius:4px;}
.red{background:#ff3366;}
.player{width:16px;height:16px;margin:2px;background:#ffd700;border-radius:50%;border:2px solid #fff;}
</style>
</head>
<body>
<h1>GameZone Pro 🎮</h1>

<div id="coins">💰 رصيدك: 100 عملة</div>

<div class="wallet">
<button class="ad" onclick="watchAd()">📺 شاهد إعلان +50</button>
<button onclick="deposit()">➕ إيداع +500</button>
<button onclick="resetGame()">🔄 تصفير</button>
</div>

<div class="games">
<div class="game" onclick="game1()">🧠 الذاكرة<br><small>+15 عملة</small></div>
<div class="game" onclick="game2()">🐦 فلابي كلام<br><small>+20 عملة</small></div>
<div class="game" onclick="game3()">✊ حجر ورقة<br><small>+10 عملة</small></div>
<div class="game" onclick="game4()">🎰 السلوتس<br><small>جاكبوت 200!</small></div>
<div class="game" onclick="game5()" style="grid-column:1/3;">🎲 ليدو<br><small>رمية بـ2 - مكسب 50!</small></div>
</div>

<div id="gameArea"></div>
<p id="result"></p>

<script>
let coins = localStorage.getItem('coins') ? parseInt(localStorage.getItem('coins')) : 100;
let ludoPos = localStorage.getItem('ludoPos') ? parseInt(localStorage.getItem('ludoPos')) : 0;
updateCoins();

function updateCoins(){
  document.getElementById('coins').innerHTML = '💰 رصيدك: ' + coins + ' عملة';
  localStorage.setItem('coins', coins);
}

function deposit(){coins += 500; updateCoins(); showResult('تم الإيداع +500 ✅', true)}
function watchAd(){coins += 50; updateCoins(); showResult('شاهدت إعلان +50 ✅', true)}
function resetGame(){if(confirm('هتصفر رصيدك؟')){coins=100;ludoPos=0;localStorage.clear();updateCoins();showResult('تم التصفير ✅', true)}}
function showResult(msg, ok){let r=document.getElementById('result');r.innerText=msg;r.style.color=ok?'#00
