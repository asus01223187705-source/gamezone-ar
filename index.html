<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدو مصر</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    font-family: 'Cairo', sans-serif;
    color: white;
    text-align: center;
  }
  .top {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
  }
  .badge {
    background: #1e293b;
    padding: 8px 20px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 17px;
  }
  
  #start h1 {
    font-size: 70px;
    color: #fbbf24;
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin: 60px 0 40px;
    font-weight: 900;
  }
  
  .btn {
    width: 88%;
    max-width: 330px;
    margin: 12px auto;
    padding: 18px;
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 23px;
    font-weight: bold;
    cursor: pointer;
    display: block;
  }
  .btn.green {
    background: linear-gradient(180deg, #10b981, #059669);
    box-shadow: 0 6px 0 #047857;
  }
  .btn.blue {
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    box-shadow: 0 6px 0 #1d4ed8;
  }
  .btn.orange {
    background: linear-gradient(180deg, #f97316, #ea580c);
    box-shadow: 0 6px 0 #c2410c;
    font-size: 19px;
  }
  
  #game { display: none; }
  #turn {
    font-size: 24px;
    margin: 20px 0;
    font-weight: bold;
  }
  
  /* الرقعة صورة طبق الأصل */
  .board {
    width: 94vw;
    max-width: 400px;
    height: 94vw;
    max-height: 400px;
    margin: 0 auto 25px;
    background: url('https://i.imgur.com/8QZ9XkL.png') center/cover no-repeat;
    border-radius: 18px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  }
  
  /* القطعة الحمرا - نحطها فوق الصورة */
  .piece {
    position: absolute;
    width: 6.5%;
    height: 6.5%;
    background: #dc2626;
    border-radius: 50%;
    border: 3px solid #7f1d1d;
    top: 10.5%;
    left: 10.5%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  }
  
  #dice {
    width: 90px;
    height: 90px;
    background: white;
    border-radius: 20px;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    color: #0f172a;
    font-weight: 900;
    box-shadow: 0 8px 0 #cbd5e1, 0 12px 20px rgba(0,0,0,0.3);
  }
  
  #roll {
    padding: 16px 50px;
    background: linear-gradient(180deg, #f97316, #ea580c);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 21px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 0 #c2410c;
  }
</style>
</head>
<body>

<div class="top">
  <div class="badge">💰 <span id="coins">266</span></div>
  <div class="badge">⭐ 72</div>
</div>

<div id="start">
  <h1>LUDO</h1>
  <button class="btn green" onclick="startGame()">2 اللاعبون</button>
  <button class="btn green" onclick="startGame()">4 اللاعبون</button>
  <button class="btn blue" onclick="startGame()">العب ضد الكمبيوتر</button>
  <button class="btn orange" onclick="watchAd()">شاهد اعلان +100 عملة</button>
</div>

<div id="game">
  <div id="turn">دورك - الأحمر</div>
  <div class="board">
    <div class="piece"></div>
  </div>
  <div id="dice">4</div>
  <button id="roll" onclick="rollDice()">ارمي الزهر</button>
</div>

<script>
let coins = 266;

function startGame() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}

function rollDice() {
  document.getElementById('dice').innerText = Math.floor(Math.random() * 6) + 1;
}

function watchAd() {
  window.open('https://exe.io/حط_رابطك', '_blank');
  setTimeout(() => {
    coins += 100;
    document.getElementById('coins').innerText = coins;
  }, 3000);
}
</script>
</body>
</html>
